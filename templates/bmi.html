<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="navbar">
    <a href="/">Home</a>
    <a href="/bmi">BMI Calculator</a>
    <a href="/water">Water Calculator</a>
    <a href="/history">History</a>
</div>
<div class="card">

    <h1>BMI Calculator</h1>

    <form method="POST" action="/calculate_bmi">

        <input
            type="number"
            name="weight"
            placeholder="Weight (kg)"
            required>

        <br><br>

        <input
            type="number"
            name="height"
            placeholder="Height (cm)"
            required>

        <br><br>

        <button type="submit">
            Calculate BMI
        </button>

    </form>

    {% if bmi %}

    <h2>Results</h2>

    <p><b>Weight:</b> {{ weight }} kg</p>

    <p><b>Height:</b> {{ height }} cm</p>

    <p><b>BMI:</b> {{ bmi }}</p>

    <p><b>Status:</b> {{ status }}</p>

    {% endif %}

</div>
<footer style="text-align:center; margin-top:30px;">
    <p>Smart Health Assistant © 2026</p>
</footer>
</body>
</html>
